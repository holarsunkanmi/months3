version: "3.9"

services:
  api:
    build: .
    container_name: churn_api
    ports:
      - "8001:8000"
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: churn_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: churn_db
    ports:
      - "5432:5432"
     